<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-ethwei-v3.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethwei Explorer</title>
    <meta
      name="description"
      content="Ping Dashboard is a block explorer/web wallet for blockchains built on Cosmos SDK, Cosmoshub, Osmosis, Juno, Evmos, Injective, Canto and 70+ blockchains listed on ping.pub"
    />
    <link rel="stylesheet" type="text/css" href="/loader.css" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://*.ping.pub; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https: http: data:; frame-src 'self' https://wallet.keplr.app; font-src 'self' data: https://fonts.gstatic.com;"
    />
  </head>
  <body>
    <div id="app">
      <div id="loading-bg">
        <div class="loading-logo">
          <img src="/ethwei-logo.png" alt="Ethwei" />
        </div>
        <div class="pre-loading">
          <div class="effect-1 effects"></div>
          <div class="effect-2 effects"></div>
          <div class="effect-3 effects"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <!-- Self-hosted @ping-pub/widget 0.3.12, patched: tx memo default ping.pub -> ethwei.com -->
    <script type="module" src="/widget/widget.min.js"></script>
  </body>
</html>
